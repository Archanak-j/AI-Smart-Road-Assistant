<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start - AI Smart Road Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .login-container {
            background-color: white;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 { color: #2c3e50; margin-bottom: 5px; font-size: 26px; }
        h4 { color: #7f8c8d; margin-top: 0; margin-bottom: 40px; font-weight: normal; font-size: 18px;}
        .login-btn {
            background-color: #00D26A;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0, 210, 106, 0.3);
            transition: background-color 0.3s;
        }
        .login-btn:hover { background-color: #00B050; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>AI based SMART road assistant</h2>
        <h4>for visually impaired people</h4>
        
        <form action="/login" method="POST">
            <button type="submit" class="login-btn">START SYSTEM</button>
        </form>
    </div>

</body>
</html>
