<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Road Assistant</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f6f9; 
            color: #333;
            padding: 10px 20px; 
            margin: 0;
        }
        h1 { margin-bottom: 5px; color: #2c3e50; font-size: 28px; }
        h3 { margin-bottom: 15px; color: #7f8c8d; font-weight: normal; font-size: 18px; }
        
        /* --- FIXED FOR NO COMPRESSION AND NO EMPTY SPACES --- */
        .video-container {
            background-color: #2c3e50;
            padding: 12px;
            border-radius: 12px;
            margin: 0 auto 20px auto; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
            
            /* This forces the box to be a large, correct size IMMEDIATELY so it doesn't compress */
            height: 65vh;             /* Fits perfectly above your buttons */
            max-height: 600px; 
            aspect-ratio: 4 / 3;      /* Matches your exact webcam shape so there are no empty sides */
        }
        
        img { 
            border: 3px solid #00D26A; 
            border-radius: 8px; 
            width: 100%;
            height: 100%;
            object-fit: cover;        /* Forces the video to fill every pixel of the green box */
            display: block;
            box-sizing: border-box;
        }
        /* ---------------------------------------------------- */

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button, .link-btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            font-family: inherit;
        }
        #pauseBtn { background-color: #f39c12; }
        #aboutBtn { background-color: #3498db; }
        .stop-btn { background-color: #e74c3c; transition: background-color 0.3s; }
        .stop-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>
    <h1>AI based SMART road assistant</h1>
    <h3>for visually impaired people</h3>
    
    <div class="video-container">
        <!-- Live Video Feed -->
        <img src="{{ url_for('video_feed') }}" alt="Live Camera Feed">
    </div>

    <!-- Web Buttons -->
    <div class="controls">
        <button id="aboutBtn" onclick="toggleAbout()">ℹ️ System Info</button>
        <button id="pauseBtn" onclick="togglePause()">Pause System</button>
        <a href="/logout" class="link-btn stop-btn">🛑 Stop System</a>
    </div>

    <script>
        function togglePause() {
            fetch('/toggle_pause', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                const btn = document.getElementById('pauseBtn');
                if(data.paused) {
                    btn.innerText = "Resume System";
                    btn.style.backgroundColor = "#2ecc71"; 
                } else {
                    btn.innerText = "Pause System";
                    btn.style.backgroundColor = "#f39c12"; 
                }
            });
        }

        function toggleAbout() {
            fetch('/toggle_about', { method: 'POST' });
        }
    </script>
</body>
</html>
